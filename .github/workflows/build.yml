on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    name: Build Signed Driver Package and Control Panel
    permissions:
      contents: write
    runs-on: windows-2022
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        #with:
        #  repository: vitoplantamura/MagicTrackpad2ForWindows
        #  ref: master

      - name: Create Source Tarball
        shell: bash
        id: create_tarball
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          mkdir .tarball
          tar -czf .tarball/source-${COMMIT_SHA}.tar.gz --exclude='.git' --exclude='.tarball' .

      - name: Upload Source Tarball
        uses: actions/upload-artifact@v4
        with:
          name: source-code-${{ steps.create_tarball.outputs.commit_sha }}
          path: .tarball/source-${{ steps.create_tarball.outputs.commit_sha }}.tar.gz

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'

      - name: Restore NuGet Packages
        run: |
          nuget restore ./AmtPtpDeviceUsbUm/MagicTrackpad2PtpDevice.vcxproj -PackagesDirectory ${{ github.workspace }}\packages
          nuget restore ./AmtPtpHidFilter/AmtPtpHidFilter.vcxproj -PackagesDirectory ${{ github.workspace }}\packages
          
      - name: Build
        shell: bash
        run: |
          sed -i 's|</TimeStampServer>|</TimeStampServer><ApiValidator_Enable>false</ApiValidator_Enable>|g' ./AmtPtpDeviceUsbUm/MagicTrackpad2PtpDevice.vcxproj
          sed -i 's|</TimeStampServer>|</TimeStampServer><ApiValidator_Enable>false</ApiValidator_Enable>|g' ./AmtPtpHidFilter/AmtPtpHidFilter.vcxproj
          msbuild.exe ./AmtPtpDeviceUsbUm/MagicTrackpad2PtpDevice.vcxproj -p:Configuration=Release -p:Platform=x64
          msbuild.exe ./AmtPtpHidFilter/AmtPtpHidFilter.vcxproj -p:Configuration=Release -p:Platform=x64
          msbuild.exe ./AmtPtpControlPanel/AmtPtpControlPanel.csproj -p:Configuration=Release -p:Platform=AnyCPU

      - name: Import Test Signing Certificate
        shell: pwsh
        env:
          TEST_CERT_PFX_B64: ${{ secrets.TEST_CERT_PFX_B64 }}
          TEST_CERT_PASSWORD: ${{ secrets.TEST_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TEST_CERT_PFX_B64)) {
            throw "Missing TEST_CERT_PFX_B64 secret."
          }
          if ([string]::IsNullOrWhiteSpace($env:TEST_CERT_PASSWORD)) {
            throw "Missing TEST_CERT_PASSWORD secret."
          }

          New-Item -ItemType Directory -Force signing | Out-Null
          [IO.File]::WriteAllBytes("$pwd\signing\mt2-test.pfx", [Convert]::FromBase64String($env:TEST_CERT_PFX_B64))
          $securePassword = ConvertTo-SecureString $env:TEST_CERT_PASSWORD -AsPlainText -Force
          $imported = Import-PfxCertificate -FilePath "$pwd\signing\mt2-test.pfx" -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword -Exportable
          Export-Certificate -Cert $imported -FilePath "$pwd\signing\mt2-test.cer" -Force | Out-Null
          Import-Certificate -FilePath "$pwd\signing\mt2-test.cer" -CertStoreLocation Cert:\CurrentUser\Root | Out-Null
          Import-Certificate -FilePath "$pwd\signing\mt2-test.cer" -CertStoreLocation Cert:\CurrentUser\TrustedPublisher | Out-Null

      - name: Stage and Sign Driver Package
        shell: pwsh
        env:
          TEST_CERT_PASSWORD: ${{ secrets.TEST_CERT_PASSWORD }}
        run: |
          function Find-Tool($toolName) {
            $candidates = @()

            if (Test-Path "C:\Program Files (x86)\Windows Kits\10\bin") {
              $candidates += Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter $toolName -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -match '\\x64\\' }
            }

            if (Test-Path "$pwd\packages") {
              $candidates += Get-ChildItem "$pwd\packages" -Recurse -Filter $toolName -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -match '\\(x64|amd64)\\' -or $_.FullName -match '\\bin\\' }
            }

            return $candidates | Sort-Object FullName -Descending | Select-Object -First 1
          }

          $sdkBin = Find-Tool "signtool.exe"
          $inf2cat = Find-Tool "inf2cat.exe"

          if (-not $sdkBin) {
            throw "signtool.exe not found in Windows Kits."
          }
          if (-not $inf2cat) {
            throw "inf2cat.exe not found in Windows Kits or restored packages."
          }

          $packageDir = Join-Path $pwd "package\AMD64"
          New-Item -ItemType Directory -Force $packageDir | Out-Null

          Copy-Item "$pwd\build\AmtPtpDevice_AMD64.inf" (Join-Path $packageDir "AmtPtpDevice.inf")
          Copy-Item "$pwd\AmtPtpDeviceUsbUm\build\AmtPtpDeviceUsbUm\x64\Release\AmtPtpDeviceUsbUm.dll" $packageDir
          Copy-Item "$pwd\AmtPtpHidFilter\build\AmtPtpHidFilter\x64\Release\AmtPtpHidFilter.sys" $packageDir
          Copy-Item "$pwd\AmtPtpDeviceUsbUm\build\AmtPtpDeviceUsbUm\x64\Release\AmtPtpDeviceUsbUm.pdb" $packageDir
          Copy-Item "$pwd\AmtPtpHidFilter\build\AmtPtpHidFilter\x64\Release\AmtPtpHidFilter.pdb" $packageDir

          & $inf2cat.FullName /driver:$packageDir /os:10_VB_X64
          if ($LASTEXITCODE -ne 0) {
            throw "inf2cat failed with exit code $LASTEXITCODE."
          }

          $signArgs = @(
            'sign',
            '/fd', 'SHA256',
            '/f', "$pwd\signing\mt2-test.pfx",
            '/p', $env:TEST_CERT_PASSWORD
          )

          & $sdkBin.FullName @signArgs (Join-Path $packageDir 'AmtPtpHidFilter.sys')
          if ($LASTEXITCODE -ne 0) {
            throw "Signing AmtPtpHidFilter.sys failed with exit code $LASTEXITCODE."
          }

          & $sdkBin.FullName @signArgs (Join-Path $packageDir 'AmtPtpDeviceUsbUm.dll')
          if ($LASTEXITCODE -ne 0) {
            throw "Signing AmtPtpDeviceUsbUm.dll failed with exit code $LASTEXITCODE."
          }

          $catFile = Get-ChildItem $packageDir -Filter *.cat | Select-Object -First 1
          if (-not $catFile) {
            throw "Catalog file not generated."
          }

          & $sdkBin.FullName @signArgs $catFile.FullName
          if ($LASTEXITCODE -ne 0) {
            throw "Signing catalog failed with exit code $LASTEXITCODE."
          }

          & $sdkBin.FullName verify /v /kp (Join-Path $packageDir 'AmtPtpHidFilter.sys')
          if ($LASTEXITCODE -ne 0) {
            throw "Kernel signature verification failed with exit code $LASTEXITCODE."
          }

          & $sdkBin.FullName verify /v /kp $catFile.FullName
          if ($LASTEXITCODE -ne 0) {
            throw "Catalog verification failed with exit code $LASTEXITCODE."
          }

      - name: Package Signed Artifacts
        shell: bash
        run: |
          echo -e '.OPTION EXPLICIT\n.Set CabinetFileCountThreshold=0\n.Set FolderFileCountThreshold=0\n.Set FolderSizeThreshold=0\n.Set MaxCabinetSize=0\n.Set MaxDiskFileCount=0\n.Set MaxDiskSize=0\n.Set CompressionType=MSZIP\n.Set Cabinet=on\n.Set Compress=on\n.Set CabinetNameTemplate=drivers_x64_signed.cab\n.Set DestinationDir=AMD64\npackage\\AMD64\\AmtPtpDevice.inf\npackage\\AMD64\\AmtPtpDevice.cat\npackage\\AMD64\\AmtPtpDeviceUsbUm.dll\npackage\\AMD64\\AmtPtpHidFilter.sys\npackage\\AMD64\\AmtPtpDeviceUsbUm.pdb\npackage\\AMD64\\AmtPtpHidFilter.pdb\n' > x64.ddf
          makecab -f x64.ddf
          mkdir result
          cp AmtPtpControlPanel/bin/Release/AmtPtpControlPanel.exe result/
          cp signing/mt2-test.cer result/
          cp -r package/AMD64 result/
          mv disk1/*.cab result/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result/
